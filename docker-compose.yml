services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: sds-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  api:
    build:
      context: .
      args:
        GIT_SHA: ${GIT_SHA:-dev}
    image: semantic-document-search:latest
    container_name: sds-api
    restart: unless-stopped
    depends_on:
      - qdrant
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./jobs.db
      QDRANT_URL: http://qdrant:6333

volumes:
  qdrant-data:
